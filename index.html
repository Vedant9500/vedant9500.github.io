    <link rel="stylesheet" href="css/main.css">

    <style>
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* LANDING SPECIFIC STYLES - PLAYFUL & BRUTALIST */

        @keyframes heroSlideUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes shapePop {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(0deg);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @property --hero-hover-x {
            syntax: '<length>';
            inherits: false;
            initial-value: 0px;
        }

        @property --hero-hover-y {
            syntax: '<length>';
            inherits: false;
            initial-value: 0px;
        }

        @property --hero-hover-shadow {
            syntax: '<length>';
            inherits: false;
            initial-value: 0px;
        }

        @keyframes cardBreathe {

            0%,
            100% {
                transform: translate(var(--hero-hover-x), var(--hero-hover-y)) scale(1);
                box-shadow:
                    calc(8px + var(--hero-hover-shadow)) calc(8px + var(--hero-hover-shadow)) 0 var(--ink);
            }

            50% {
                transform: translate(calc(var(--hero-hover-x) - 1px), calc(var(--hero-hover-y) - 1px)) scale(1.008);
                box-shadow:
                    calc(8px + var(--hero-hover-shadow)) calc(8px + var(--hero-hover-shadow)) 8px rgba(255, 183, 197, 0.18),
                    calc(8px + var(--hero-hover-shadow)) calc(8px + var(--hero-hover-shadow)) 0 var(--ink);
            }
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
            background-color: var(--bg-cream);
            background-image: radial-gradient(rgba(113, 90, 110, 0.22) 1.2px, transparent 1.2px);
            background-size: 28px 28px;
        }

        .hero-card {
            --hero-hover-x: 0px;
            --hero-hover-y: 0px;
            --hero-hover-shadow: 0px;
            background: var(--bg-card);
            border: var(--border-main);
            padding: 60px;
            max-width: 800px;
            width: 100%;
            position: relative;
            box-shadow: 8px 8px 0 var(--ink);
            border-radius: 20px;
            transition:
                --hero-hover-x 280ms cubic-bezier(0.22, 1, 0.36, 1),
                --hero-hover-y 280ms cubic-bezier(0.22, 1, 0.36, 1),
                --hero-hover-shadow 280ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, box-shadow;
            z-index: 10;
            animation: heroSlideUp 1s cubic-bezier(0.22, 1, 0.36, 1) both,
                cardBreathe 6s ease-in-out 2.5s infinite;
        }

        .hero-card .about-name {
            animation: heroSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
        }

        .hero-card .role {
            animation: heroSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
        }

        .hero-card .bio-intro {
            animation: heroSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both;
        }

        .hero-card:hover {
            --hero-hover-x: -4px;
            --hero-hover-y: -4px;
            --hero-hover-shadow: 4px;
        }

        /* Decorative Background Shapes */
        .decor {
            position: absolute;
            border: var(--border-main);
            z-index: 1;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            transition: box-shadow 0.25s ease, filter 0.3s ease;
        }

        .decor:hover {
            filter: brightness(1.08) saturate(1.2);
        }

        .decor:active {
            cursor: grabbing;
        }

        /* Role Tag */
        .role {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 2.5rem;
            display: inline-block;
            background: var(--accent-yellow);
            padding: 6px 16px;
            border: var(--border-thin);
            border-radius: 20px;
            box-shadow: 3px 3px 0 var(--ink);
            letter-spacing: 0.5px;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .bio-intro {
            font-family: var(--font-body);
            color: var(--ink);
            font-weight: 400;
            font-size: 1.25rem;
            margin-bottom: 3.5rem;
            line-height: 1.7;
            max-width: 600px;
        }

        .cta-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease 0.65s both;
        }

        /* Header */
        .landing-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            animation: fadeIn 0.6s ease 0.2s both;
            pointer-events: none;
        }

        .landing-header>* {
            pointer-events: auto;
        }

        .brand {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--ink);
            padding: 6px 14px;
            border: var(--border-main);
            background: var(--bg-card);
            box-shadow: 4px 4px 0 var(--ink);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .brand:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 var(--ink);
        }

        /* Footer */
        .landing-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ink);
            width: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .landing-footer>* {
            pointer-events: auto;
        }

        @media screen and (max-width: 768px) {
            .hero-card {
                padding: 30px;
            }

            .about-name {
                font-size: 3.5rem;
            }

            .landing-header,
            .landing-footer {
                padding: 20px;
            }

            .decor {
                opacity: 0.5;
            }
        }
    </style>
</head>
